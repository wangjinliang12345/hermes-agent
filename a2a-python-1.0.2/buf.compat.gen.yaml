# Protobuf generation for legacy v0.3 A2A protocol buffer modules.
---
version: v2
managed:
  enabled: true
plugins:
  - remote: buf.build/protocolbuffers/python:v29.3
    out: src/a2a/compat/v0_3
  - remote: buf.build/grpc/python
    out: src/a2a/compat/v0_3
  - remote: buf.build/protocolbuffers/pyi
    out: src/a2a/compat/v0_3
